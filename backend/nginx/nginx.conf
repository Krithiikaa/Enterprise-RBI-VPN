worker_processes auto;
events { worker_connections 2048; }

http {
    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_user_agent"';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # noVNC streams can be long-lived; do not time them out aggressively.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream session_broker { server session-broker:9000; }
    upstream ws_relay       { server ws-relay:9200; }

    server {
        listen 80;
        server_name _;

        # CORS preflight for the extension (extension origin is chrome-extension://*)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) { return 204; }

        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        # Public session-lifecycle + stats API.
        location /api/ {
            proxy_pass         http://session_broker/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # noVNC WebSocket: /vnc/<sessionId>  -> ws-relay -> browser container.
        location /vnc/ {
            proxy_pass         http://ws_relay;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
        }

        # The noVNC viewer page itself (served by ws-relay static handler).
        location /viewer/ {
            proxy_pass         http://ws_relay;
            proxy_set_header   Host $host;
        }
    }
}

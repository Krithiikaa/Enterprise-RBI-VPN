# Precision RBI — nginx  [SRV-01]
worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;

  # Access log -> Docker stdout (HC: access log to stdout)
  log_format  rbi  '$remote_addr "$request" $status ${body_bytes_sent}B '
                   'rt=$request_time ua="$http_user_agent"';
  access_log /dev/stdout rbi;
  error_log  /dev/stderr warn;

  # Rate limiting: 100 req/min per IP (~1.67 r/s, burst smooths spikes)
  limit_req_zone $binary_remote_addr zone=perip:10m rate=100r/m;

  # WebSocket upgrade map (noVNC streams)
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  upstream broker { server session-broker:3001; }
  upstream proxy  { server proxy-service:8081; }   # thin score API
  upstream pac    { server proxy-service:8888; }   # PAC + CA download
  upstream admin  { server admin-console:3000; }
  upstream bdr    { server bdr-service:3002; }

  server {
    listen 80;
    server_name _;
    # Redirect everything to HTTPS except the CA/PAC bootstrap (served on http too).
    location /pac.js { proxy_pass http://pac/pac.js; }
    location /ca.crt { proxy_pass http://pac/ca.crt; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/server.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    limit_req zone=perip burst=40 nodelay;

    # --- RBI broker (incl. noVNC WS bridge at /rbi/ws/{id}) ---
    location /rbi/ {
      rewrite ^/rbi/(.*)$ /$1 break;
      proxy_pass http://broker;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;   # long-lived VNC streams
    }

    # --- score API for popup badge ---
    location /proxy/ { rewrite ^/proxy/(.*)$ /$1 break; proxy_pass http://proxy; }

    # --- PAC + CA over https too ---
    location /pac.js { proxy_pass http://pac/pac.js; }
    location /ca.crt { proxy_pass http://pac/ca.crt; }

    # --- BDR ingest ---
    location /api/bdr-event { proxy_pass http://bdr/api/bdr-event; proxy_set_header Host $host; }

    # --- admin console ---
    location /admin/ {
      rewrite ^/admin/(.*)$ /$1 break;
      proxy_pass http://admin;
      proxy_set_header Host $host;
    }
    location = /admin { return 301 /admin/; }
  }
}

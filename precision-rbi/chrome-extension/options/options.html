<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precision RBI — Settings</title>
  <link rel="stylesheet" href="../fonts/fonts.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--navy); color: var(--text); font-family: var(--sans); padding: 40px 20px; }
    .wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-family: var(--serif); font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    h1 span { color: var(--mint); }
    .lead { color: var(--text-dim); margin-bottom: 28px; font-size: 13px; }
    .card { background: var(--navy-mid); border: 0.5px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 18px; }
    .card h2 { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--mint); }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .row:last-child { border-bottom: 0; }
    .row label { font-size: 13px; }
    .row .hint { display: block; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    input[type=text], input[type=number] { background: var(--navy); border: 0.5px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 8px; font-family: var(--mono); font-size: 13px; width: 180px; }
    input[type=text]:focus, input[type=number]:focus { outline: none; border-color: var(--mint); }
    select { background: var(--navy); border: 0.5px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 8px; font-family: var(--sans); }
    .switch { position: relative; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #5c6b7a; border-radius: 24px; cursor: pointer; transition: 150ms; }
    .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: var(--navy); border-radius: 50%; transition: 150ms; }
    input:checked + .slider { background: var(--success); }
    input:checked + .slider::before { transform: translateX(18px); }
    input[type=range] { width: 220px; accent-color: var(--mint); }
    .threshold-val { font-family: var(--serif); font-size: 18px; color: var(--mint); min-width: 32px; display: inline-block; text-align: right; }
    .btn { padding: 10px 18px; border-radius: 9px; font-weight: 600; font-size: 13px; cursor: pointer; border: 0.5px solid; transition: 150ms; }
    .btn.primary { background: var(--mint); color: var(--navy); border-color: var(--mint); }
    .btn.ghost { background: transparent; color: var(--text-dim); border-color: var(--border); }
    .btn.ghost:hover { color: var(--mint); border-color: var(--mint); }
    .save-bar { display: flex; gap: 10px; align-items: center; }
    #saveMsg { font-size: 12px; color: var(--success); opacity: 0; transition: 150ms; }
    #saveMsg.show { opacity: 1; }
    .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .info-grid .cell { text-align: center; padding: 10px; background: var(--navy); border-radius: 9px; border: 0.5px solid var(--border); }
    .info-grid .k { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); }
    .info-grid .v { font-family: var(--serif); font-size: 18px; margin-top: 4px; }
    #testResult { font-size: 12px; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Precision <span>RBI</span> Settings</h1>
    <p class="lead">Configure once. Team members only set the server address — everything else is automatic.</p>

    <div class="card">
      <h2>Gateway Connection</h2>
      <div class="row">
        <label>Server IP / Host<span class="hint">The address of your Precision RBI backend</span></label>
        <input type="text" id="serverHost" placeholder="10.225.244.10" />
      </div>
      <div class="row">
        <label>HTTPS Port</label>
        <input type="number" id="serverPort" value="443" />
      </div>
      <div class="row">
        <label>Proxy Port<span class="hint">PAC routes traffic here</span></label>
        <input type="number" id="proxyPort" value="8080" />
      </div>
      <div class="row">
        <label>Connection test</label>
        <div><button class="btn ghost" id="testBtn">Test Connection</button><span id="testResult"></span></div>
      </div>
    </div>

    <div class="card">
      <h2>Isolation Policy</h2>
      <div class="row">
        <label>Isolation mode<span class="hint">When to render pages in the remote container</span></label>
        <select id="isolationMode">
          <option value="always">Always isolate</option>
          <option value="smart" selected>Smart (ML-based)</option>
          <option value="never">Never (proxy only)</option>
        </select>
      </div>
      <div class="row">
        <label>Risk threshold<span class="hint">Isolate when page score exceeds this</span></label>
        <div style="display:flex;align-items:center;gap:12px;">
          <input type="range" id="riskThreshold" min="0" max="100" value="50" />
          <span class="threshold-val" id="thresholdVal">50</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Data Loss Prevention</h2>
      <div class="row"><label>Block clipboard</label><label class="switch"><input type="checkbox" id="dlpBlockClipboard" /><span class="slider"></span></label></div>
      <div class="row"><label>Block downloads</label><label class="switch"><input type="checkbox" id="dlpBlockDownload" /><span class="slider"></span></label></div>
      <div class="row"><label>Block printing</label><label class="switch"><input type="checkbox" id="dlpBlockPrint" /><span class="slider"></span></label></div>
      <div class="row"><label>Watermark isolated sessions</label><label class="switch"><input type="checkbox" id="dlpWatermark" checked /><span class="slider"></span></label></div>
    </div>

    <div class="card">
      <h2>Server Status</h2>
      <div class="info-grid">
        <div class="cell"><div class="k">Version</div><div class="v" id="srvVersion">—</div></div>
        <div class="cell"><div class="k">Active Users</div><div class="v" id="srvUsers">—</div></div>
        <div class="cell"><div class="k">Uptime</div><div class="v" id="srvUptime">—</div></div>
      </div>
    </div>

    <div class="save-bar">
      <button class="btn primary" id="saveBtn">Save Settings</button>
      <span id="saveMsg">✓ Saved</span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
